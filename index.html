<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HLD & TSC Review</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
/* ============================================================
   CSS VARIABLES & THEME
   ============================================================ */
:root {
  --bg-primary: #0f1419;
  --bg-secondary: #1a1f2e;
  --bg-tertiary: #242b3d;
  --bg-card: #1e2538;
  --bg-hover: #2a3349;
  --bg-input: #151a27;
  --border: #2d3548;
  --border-focus: #4c7bf5;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a8;
  --text-muted: #5a6478;
  --text-link: #6fa1f8;
  --accent: #4c7bf5;
  --accent-hover: #6b93f7;
  --accent-muted: rgba(76, 123, 245, 0.15);
  --accent-glow: rgba(76, 123, 245, 0.3);
  --success: #3dd68c;
  --success-bg: rgba(61, 214, 140, 0.12);
  --warning: #f5a623;
  --warning-bg: rgba(245, 166, 35, 0.12);
  --danger: #f5564a;
  --danger-bg: rgba(245, 86, 74, 0.12);
  --info: #4cc9f0;
  --info-bg: rgba(76, 201, 240, 0.12);
  --purple: #a78bfa;
  --purple-bg: rgba(167, 139, 250, 0.12);
  --orange: #fb923c;
  --orange-bg: rgba(251, 146, 60, 0.12);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.35);
  --transition: 0.2s ease;
  --sidebar-width: 260px;
  --header-height: 56px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Oxygen, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { height: 100%; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============================================================
   APP LAYOUT
   ============================================================ */
.app {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 200;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: var(--header-height);
}

.sidebar-logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}

.sidebar-brand {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.sidebar-brand h2 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.sidebar-brand small {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 10px;
  overflow-y: auto;
}

.nav-section {
  margin-bottom: 8px;
}
.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 8px 12px 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--accent-muted);
  color: var(--accent);
}
.nav-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.7;
}
.nav-item.active svg { opacity: 1; }
.nav-item .badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px;
  border-radius: var(--radius-sm);
}
.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: #fff;
  flex-shrink: 0;
}
.sidebar-user-info {
  min-width: 0;
}
.sidebar-user-info .name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-user-info .role {
  font-size: 11px;
  color: var(--text-muted);
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

.topbar {
  height: var(--header-height);
  min-height: var(--header-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  z-index: 100;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 4px;
}
.menu-toggle svg { width: 22px; height: 22px; }

.topbar-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
}

/* ============================================================
   COMMON COMPONENTS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  white-space: nowrap;
  user-select: none;
}
.btn svg { width: 16px; height: 16px; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--bg-hover); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border-color: transparent;
}
.btn-ghost:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon {
  padding: 6px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}
.btn-icon:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.btn-icon svg { width: 18px; height: 18px; }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-danger:hover { opacity: 0.85; }
.btn-success { background: var(--success); color: #000; border-color: var(--success); }

.badge-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.badge-draft { background: var(--info-bg); color: var(--info); }
.badge-review { background: var(--warning-bg); color: var(--warning); }
.badge-approved { background: var(--success-bg); color: var(--success); }
.badge-archived { background: rgba(255,255,255,0.06); color: var(--text-muted); }
.badge-changes { background: var(--orange-bg); color: var(--orange); }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.card:hover {
  border-color: var(--accent-glow);
}
.card-clickable { cursor: pointer; }
.card-clickable:hover { box-shadow: var(--shadow); }

input[type="text"], input[type="search"], textarea, select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  transition: border-color var(--transition);
  width: 100%;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-muted);
}

.search-box {
  position: relative;
  max-width: 300px;
}
.search-box svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
}
.search-box input { padding-left: 32px; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: var(--accent-muted);
  color: var(--accent);
}

/* ============================================================
   TABS
   ============================================================ */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all var(--transition);
  user-select: none;
}
.tab:hover { color: var(--text-secondary); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ============================================================
   PAGE: DASHBOARD
   ============================================================ */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.stat-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

.activity-feed { display: flex; flex-direction: column; gap: 8px; }
.activity-item {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  font-size: 13px;
}
.activity-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.activity-content { flex: 1; min-width: 0; }
.activity-content .activity-text { color: var(--text-secondary); }
.activity-content .activity-text strong { color: var(--text-primary); font-weight: 600; }
.activity-content .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.recent-docs { display: flex; flex-direction: column; gap: 8px; }
.doc-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  cursor: pointer;
  transition: background var(--transition);
}
.doc-row:hover { background: var(--bg-hover); }
.doc-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.doc-icon svg { width: 18px; height: 18px; }
.doc-icon.hld { background: var(--accent-muted); color: var(--accent); }
.doc-icon.tsc { background: var(--purple-bg); color: var(--purple); }
.doc-row-info { flex: 1; min-width: 0; }
.doc-row-info .doc-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.doc-row-info .doc-meta {
  font-size: 11px;
  color: var(--text-muted);
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

/* ============================================================
   PAGE: DOCUMENTS
   ============================================================ */
.doc-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-chip {
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text-primary); }
.filter-chip.active { background: var(--accent-muted); border-color: var(--accent); color: var(--accent); }

.doc-list { display: flex; flex-direction: column; gap: 10px; }

.doc-card {
  display: flex;
  gap: 12px;
  padding: 14px;
  cursor: pointer;
}
.doc-card-body { flex: 1; min-width: 0; }
.doc-card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.doc-card-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.doc-card-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.doc-card-footer .avatar-sm {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 600;
  color: #fff;
  margin-right: -4px;
}
.doc-card-footer .meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 8px;
}

/* ============================================================
   PAGE: EDITOR
   ============================================================ */
.editor-layout {
  display: flex;
  gap: 0;
  height: calc(100vh - var(--header-height) - 40px);
  margin: -20px;
}

.editor-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--border);
}

.editor-toolbar {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-wrap: wrap;
}
.editor-toolbar .divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

.editor-title-input {
  font-size: 22px;
  font-weight: 700;
  padding: 16px 20px 8px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  width: 100%;
  outline: none;
}
.editor-title-input::placeholder { color: var(--text-muted); }

.editor-area {
  flex: 1;
  padding: 0 20px 20px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.7;
  outline: none;
  min-height: 200px;
  color: var(--text-primary);
}
.editor-area:empty::before {
  content: "Start writing your document...";
  color: var(--text-muted);
}
.editor-area h1 { font-size: 24px; margin: 16px 0 8px; }
.editor-area h2 { font-size: 20px; margin: 14px 0 6px; }
.editor-area h3 { font-size: 17px; margin: 12px 0 4px; }
.editor-area p { margin-bottom: 8px; }
.editor-area ul, .editor-area ol { margin: 8px 0 8px 20px; }
.editor-area blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}
.editor-area code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 13px;
}
.editor-area pre {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
}
.editor-area pre code { background: transparent; padding: 0; }

.editor-sidebar {
  width: 300px;
  display: flex;
  flex-direction: column;
  background: var(--bg-secondary);
  overflow: hidden;
}
.editor-sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.editor-sidebar-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
}
.editor-sidebar-tab:hover { color: var(--text-secondary); }
.editor-sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.editor-sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* Comments */
.comment-thread {
  margin-bottom: 12px;
}
.comment {
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 6px;
}
.comment-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.comment-avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.comment-author { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.comment-time { font-size: 10px; color: var(--text-muted); margin-left: auto; }
.comment-body { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.comment-actions {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}
.comment-action {
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
}
.comment-action:hover { color: var(--accent); }
.comment-reply {
  margin-left: 16px;
}
.comment-input-area {
  margin-top: 8px;
}
.comment-input-area textarea {
  min-height: 60px;
  resize: vertical;
  margin-bottom: 6px;
}
.comment.resolved {
  opacity: 0.5;
}

.version-list { display: flex; flex-direction: column; gap: 8px; }
.version-item {
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  cursor: pointer;
  transition: background var(--transition);
}
.version-item:hover { background: var(--bg-hover); }
.version-item .version-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.version-item .version-meta {
  font-size: 11px;
  color: var(--text-muted);
}
.version-item .version-diff {
  margin-top: 4px;
  font-size: 11px;
}
.version-item .diff-add { color: var(--success); }
.version-item .diff-del { color: var(--danger); }

/* Review info */
.review-info-section { margin-bottom: 16px; }
.review-info-section h4 {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.reviewer-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
}
.reviewer-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.reviewer-name { font-size: 13px; flex: 1; }
.reviewer-status { font-size: 11px; font-weight: 600; }
.reviewer-status.approved { color: var(--success); }
.reviewer-status.pending { color: var(--warning); }
.reviewer-status.changes { color: var(--orange); }

/* ============================================================
   PAGE: TEMPLATES
   ============================================================ */
.template-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.template-card {
  padding: 16px;
  cursor: pointer;
}
.template-card-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
}
.template-card-icon svg { width: 20px; height: 20px; }
.template-card h4 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
}
.template-card p {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.4;
}
.template-card .template-meta {
  margin-top: 10px;
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text-muted);
}

/* ============================================================
   PAGE: REVIEWS
   ============================================================ */
.review-list { display: flex; flex-direction: column; gap: 10px; }
.review-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
}
.review-card-body { flex: 1; min-width: 0; }
.review-card-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.review-card-meta { font-size: 12px; color: var(--text-muted); }
.review-card-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ============================================================
   PAGE: DB VISUALIZER
   ============================================================ */
.visualizer-layout {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.schema-input-area {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.schema-input-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-tertiary);
}
.schema-input-header h4 { font-size: 13px; font-weight: 600; }
.schema-textarea {
  width: 100%;
  min-height: 200px;
  padding: 14px;
  background: var(--bg-input);
  border: none;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
}
.diagram-output {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
}
.diagram-output .mermaid {
  width: 100%;
}
.diagram-output svg { max-width: 100%; }

.schema-examples {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ============================================================
   PAGE: FEATURES
   ============================================================ */
.features-grid {

  gap: 16px;

  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.feature-group h3 {

  font-weight: 600;
  margin-bottom: 12px;

  align-items: center;
  gap: 8px;
}
.feature-group h3 svg { width: 18px; height: 18px; }
.feature-list {

}
.feature-list li {
  padding: 6px 0;
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: flex-start;
  gap: 8px;
  line-height: 1.4;
}
.feature-list li::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 6px;
}
.feature-list li.done::before { background: var(--success); }
.feature-list li.planned::before { background: var(--warning); }

/* ============================================================
   FORM GROUPS
   ============================================================ */
.form-group {
  margin-bottom: 14px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.form-row {
  display: flex;
  gap: 12px;
}
.form-row .form-group { flex: 1; }

.tag-input {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 4px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  min-height: 36px;
  align-items: center;
}
.tag-input .tag { cursor: default; }
.tag-input .tag .tag-remove {
  cursor: pointer;
  margin-left: 4px;
  opacity: 0.6;
}
.tag-input .tag .tag-remove:hover { opacity: 1; }
.tag-input input {
  flex: 1;
  min-width: 80px;
  border: none;
  background: transparent;
  padding: 4px;
  font-size: 12px;
}
.tag-input input:focus { box-shadow: none; }

/* ============================================================
   TOAST NOTIFICATIONS
   ============================================================ */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 240px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--info); }

/* ============================================================

@media (max-width: 768px) {

    description: 'Comprehensive template for scaffolding new NES (Never-Ending Support) backend services, covering project structure, build system, configuration, Docker, CI/CD, deployment, and scaffolding checklist.',
    content: '<h1>NES Service Project Template</h1><p>A comprehensive template for scaffolding new NES (Never-Ending Support) backend services, derived from the production <code>nes-ontology</code> service. This template covers project structure, build system, configuration, Docker, CI/CD, deployment, and a scaffolding checklist.</p><hr><h2>1. Project Structure</h2><pre><code>nes-&lt;service-name&gt;/\n\u251c\u2500\u2500 .github/\n\u2502   \u2514\u2500\u2500 workflows/\n\u2502       \u251c\u2500\u2500 ci.yml                    # PR checks (lint, typecheck, boundaries, unit tests)\n\u2502       \u251c\u2500\u2500 release-to-stage.yml      # Main branch \u2192 build image \u2192 create stage deploy PR\n\u2502       \u251c\u2500\u2500 promote-to-prod.yml       # Manual: promote stage image tag to prod values PR\n\u2502       \u251c\u2500\u2500 e2e-staging.yml           # E2E gate on prod deploy PRs (tests against staging)\n\u2502       \u2514\u2500\u2500 publish-client.yml        # Publish @nes/&lt;name&gt;-client to Artifactory npm-dev\n\u251c\u2500\u2500 client/                           # GraphQL client package (@nes/&lt;name&gt;-client)\n\u251c\u2500\u2500 data/\n\u2502   \u2514\u2500\u2500 migrations/                   # SQL migrations (ordered by timestamp)\n\u251c\u2500\u2500 docs/\n\u2502   \u2514\u2500\u2500 migrations/                   # Architecture summaries for each migration\n\u251c\u2500\u2500 infra/\n\u2502   \u2514\u2500\u2500 helm/                         # Helm values for stage and prod\n\u251c\u2500\u2500 scripts/                          # Setup and utility scripts\n\u251c\u2500\u2500 src/\n\u2502   \u251c\u2500\u2500 main.ts                       # Entrypoint\n\u2502   \u251c\u2500\u2500 config.ts                     # Centralized env var access\n\u2502   \u251c\u2500\u2500 domain.ts                     # App/request service type definitions\n\u2502   \u251c\u2500\u2500 services.ts                   # Service factory functions\n\u2502   \u251c\u2500\u2500 db-config.ts                  # Knex database connection config\n\u2502   \u251c\u2500\u2500 generated/                    # Codegen output (committed)\n\u2502   \u251c\u2500\u2500 app/                          # Fastify plugins and routes\n\u2502   \u251c\u2500\u2500 security/                     # Auth helpers (JWT, OIDC)\n\u2502   \u251c\u2500\u2500 shared/                       # Pure utilities (lowest layer)\n\u2502   \u2514\u2500\u2500 &lt;domain&gt;/                    # Domain modules (one per bounded context)\n\u2502       \u251c\u2500\u2500 schema.graphql            # Domain GraphQL schema\n\u2502       \u251c\u2500\u2500 resolvers.ts              # GraphQL resolvers\n\u2502       \u251c\u2500\u2500 service.ts                # Domain business logic\n\u2502       \u251c\u2500\u2500 repository.ts             # Database access\n\u2502       \u2514\u2500\u2500 types.ts                  # Domain-specific types\n\u251c\u2500\u2500 tests/                            # Unit and E2E tests\n\u251c\u2500\u2500 tools/                            # Ingestion scripts and CLI tools\n\u251c\u2500\u2500 Dockerfile                        # Production container image\n\u251c\u2500\u2500 package.json / pnpm-workspace.yaml\n\u251c\u2500\u2500 tsconfig.json / biome.json\n\u251c\u2500\u2500 vitest.config.ts / vitest.e2e.config.ts\n\u2514\u2500\u2500 CLAUDE.md / README.md</code></pre><h2>2. Build System (pnpm)</h2><p>Uses pnpm workspaces with a dependency catalog. All dependency versions are pinned centrally in <code>pnpm-workspace.yaml</code> using <code>catalog:</code> references.</p><p><strong>Key scripts:</strong></p><ul><li><code>pnpm dev</code> \u2014 Start with hot reload (<code>node --watch src/main.ts</code>)</li><li><code>pnpm biome</code> / <code>pnpm biome:fix</code> \u2014 Lint and format</li><li><code>pnpm codegen</code> \u2014 Generate GraphQL types</li><li><code>pnpm lint:boundaries</code> \u2014 Check module boundaries</li><li><code>pnpm test</code> / <code>pnpm test:e2e</code> \u2014 Run unit / E2E tests</li><li><code>pnpm typecheck</code> \u2014 TypeScript type checking</li></ul><h2>3. TypeScript Configuration</h2><p><strong>Key decisions:</strong></p><ul><li><code>noEmit: true</code> \u2014 Node 24 runs <code>.ts</code> natively via type stripping; no build step</li><li><code>erasableSyntaxOnly: true</code> \u2014 Required for Node\'s native TS support</li><li><code>verbatimModuleSyntax: true</code> \u2014 Enforces <code>import type</code> for type-only imports</li><li><code>noUncheckedIndexedAccess: true</code> \u2014 All index access may be <code>undefined</code></li></ul><h2>4. Linting &amp; Formatting</h2><p>Uses <strong>Biome</strong> for formatting and general linting (2-space indent, single quotes, 120-char lines). ESLint is scoped to <strong>module boundary enforcement only</strong> via <code>eslint-plugin-boundaries</code>.</p><h2>5. Application Entry Point</h2><p>Entry via <code>src/main.ts</code> using <code>@nes/shared</code> app builder. Centralized configuration in <code>src/config.ts</code> covering:</p><ul><li>Service metadata (name, version, lane)</li><li>Security (Keycloak OIDC)</li><li>Observability (OpenTelemetry)</li><li>Apollo Federation subgraph</li><li>Database (Knex)</li><li>Fastify autoload (routes, plugins)</li></ul><h2>6. GraphQL Code Generation</h2><p>Uses <code>@graphql-codegen/cli</code> to generate both server-side resolver types (<code>src/generated/graphql.ts</code>) and client-side operation types (<code>client/generated.ts</code>). Federation-compatible with typed document nodes.</p><h2>7. Test Configuration</h2><p><strong>Unit tests</strong> via <code>vitest.config.ts</code> \u2014 run in Node environment, globals enabled, V8 coverage.</p><p><strong>E2E tests</strong> via <code>vitest.e2e.config.ts</code> \u2014 30s timeout, 2 retries, sequential execution, no coverage.</p><h2>8. Docker Setup</h2><p><strong>Key patterns:</strong></p><ul><li>Alpine Node 24.12.0 base for minimal image size</li><li>Non-root <code>node</code> user (UID 1000) for security</li><li>BuildKit secret mounting for <code>.npmrc</code> (private registry auth)</li><li>Production-only deps via <code>--prod --frozen-lockfile</code></li><li>RDS CA bundle fetched at build time for PostgreSQL TLS</li><li>No build step needed \u2014 Node 24 runs <code>.ts</code> natively</li></ul><h2>9. CI/CD Workflows</h2><p>Five GitHub Actions workflows:</p><ul><li><strong>ci.yml</strong> \u2014 PR checks: commit lint, markdown lint, module boundaries, code quality (Biome), typecheck, codegen verification, client build, unit tests</li><li><strong>release-to-stage.yml</strong> \u2014 On push to main: build Docker image, tag with 7-char SHA, push to GHCR, create PR to update <code>values-stage.yml</code></li><li><strong>promote-to-prod.yml</strong> \u2014 Manual dispatch: copy stage image tag to <code>values-prod.yml</code>, promote client npm-dev \u2192 npm-prod</li><li><strong>e2e-staging.yml</strong> \u2014 Production gate: runs E2E tests against staging when <code>values-prod.yml</code> is updated</li><li><strong>publish-client.yml</strong> \u2014 Auto-publish client package to Artifactory on client changes</li></ul><h2>10. Deployment (Helm + ArgoCD)</h2><p><strong>Deployment Flow:</strong></p><p>Feature branch \u2192 PR \u2192 Merge to main \u2192 Build Docker image (7-char SHA) \u2192 Push to GHCR \u2192 Create stage deploy PR (auto-approved) \u2192 ArgoCD syncs stage \u2192 Manual promote-to-prod \u2192 E2E gate \u2192 ArgoCD syncs prod</p><p><strong>Stage vs Prod differences:</strong></p><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:6px">Setting</th><th style="text-align:left;padding:6px">Stage</th><th style="text-align:left;padding:6px">Prod</th></tr><tr style="border-bottom:1px solid var(--border)"><td style="padding:6px">minReplicas</td><td style="padding:6px">1</td><td style="padding:6px">3</td></tr><tr style="border-bottom:1px solid var(--border)"><td style="padding:6px">maxReplicas</td><td style="padding:6px">2</td><td style="padding:6px">5</td></tr><tr style="border-bottom:1px solid var(--border)"><td style="padding:6px">CPU requests</td><td style="padding:6px">250m</td><td style="padding:6px">500m</td></tr><tr style="border-bottom:1px solid var(--border)"><td style="padding:6px">Memory limits</td><td style="padding:6px">512M</td><td style="padding:6px">1Gi</td></tr></table><h2>11. Conventions &amp; Rules</h2><p><strong>Commit messages:</strong> Conventional commits with scoped prefixes (<code>feat(&lt;domain&gt;)</code>, <code>fix(&lt;domain&gt;)</code>, <code>chore(stage)</code>, etc.)</p><p><strong>Module Boundary Architecture:</strong> Default \u201cdisallow\u201d \u2014 every cross-boundary import must be explicitly allowed. Domains are isolated from each other. Shared and generated modules form the bottom layer.</p><p><strong>Code rules:</strong></p><ol><li>No ad hoc <code>process.env</code> \u2014 centralize in <code>src/config.ts</code></li><li>No <code>new Date()</code> \u2014 use <code>Temporal</code> from <code>@js-temporal/polyfill</code></li><li>No <code>any</code> without justification</li><li>Biome defaults \u2014 2-space indent, single quotes, 120-char lines</li><li>Migration docs \u2014 every SQL migration gets an architecture summary</li></ol><h2>12. Required GitHub Secrets &amp; Variables</h2><p><strong>Repository Variables:</strong></p><ul><li><code>AWS_OIDC_ROLE_ARN</code> \u2014 AWS role ARN for OIDC federation</li><li><code>AWS_REGION</code> \u2014 AWS region for OIDC</li><li><code>NES_UNIVERSE_CLIENT_ID</code> \u2014 Keycloak client ID for E2E OAuth2 token</li></ul><p><strong>Repository Secrets:</strong></p><ul><li><code>NES_CI_READ_TOKEN</code> \u2014 GitHub PAT for creating PRs</li><li><code>NES_UNIVERSE_DEV_CLIENT_SECRET</code> \u2014 Keycloak client secret for E2E tests</li></ul><h2>13. Scaffolding Checklist</h2><h3>Initial Setup</h3><ul><li>Create repo <code>neverendingsupport/nes-&lt;service-name&gt;</code></li><li>Copy template files from this document</li><li>Replace all <code>&lt;service-name&gt;</code> / <code>&lt;name&gt;</code> / <code>&lt;domain&gt;</code> placeholders</li><li>Set <code>.nvmrc</code> to <code>24.12.0</code></li><li>Run <code>corepack enable &amp;&amp; pnpm install</code></li></ul><h3>Configuration</h3><ul><li>Configure <code>src/config.ts</code> with service-specific env vars</li><li>Configure <code>src/db-config.ts</code> with database connections</li><li>Define <code>src/domain.ts</code> with app/request service types</li><li>Implement <code>src/services.ts</code> service factories</li></ul><h3>GraphQL Schema</h3><ul><li>Create <code>src/&lt;domain&gt;/schema.graphql</code> for each domain</li><li>Run <code>pnpm codegen</code> to generate types</li><li>Commit generated files</li></ul><h3>CI/CD</h3><ul><li>Create all 5 workflow files in <code>.github/workflows/</code></li><li>Set required repository secrets and variables</li><li>Configure branch protection on <code>main</code></li></ul><h3>Deployment</h3><ul><li>Create Helm values for stage and prod</li><li>Configure ArgoCD application</li><li>Set GHCR image pull secret in target namespaces</li><li>Verify health endpoint at <code>/internal/health</code></li></ul><h3>Validation</h3><ul><li><code>pnpm biome:fix</code> passes</li><li><code>pnpm typecheck</code> passes</li><li><code>pnpm lint:boundaries</code> passes</li><li><code>pnpm test</code> passes</li><li><code>pnpm codegen</code> produces no uncommitted changes</li><li>Docker build succeeds locally</li><li>Service starts with <code>LANE=local AUTH_ENABLED=false pnpm dev</code></li></ul>',

    id: 'd1', title: 'Agent Executor Platform HLD', type: 'hld', status: 'approved',
    description: 'High-level design for the agent executor platform including container orchestration, MCP integration, and security model.',
    content: '<h1>Agent Executor Platform HLD</h1><h2>1. Overview</h2><p>The Agent Executor Platform provides a secure, isolated environment for executing AI agent tasks within the HeroDevs ecosystem. It enables agents to perform complex operations while maintaining tenant isolation and audit trails.</p><h2>2. Architecture</h2><p>The platform consists of three main components:</p><ul><li><strong>Executor Service</strong> - Manages agent lifecycle, resource allocation, and task scheduling</li><li><strong>MCP Gateway</strong> - Routes tool calls through the Model Context Protocol layer</li><li><strong>Sandbox Runtime</strong> - Provides isolated execution environments with resource limits</li></ul><h2>3. Data Model</h2><p>Core entities include Agent, Execution, Task, and AuditLog. Each execution is scoped to a tenant and tracked with full provenance.</p><h2>4. Security</h2><p>All executions run in unprivileged containers with network policies. Tool access is governed by OAuth2 scopes and RLS policies ensure tenant data isolation.</p>',

    content: '<h1>Channel Messaging System Design</h1><h2>1. Overview</h2><p>The Channel Messaging System enables real-time, persistent communication between agents, services, and human operators. It provides pub/sub semantics with guaranteed delivery and message replay.</p><h2>2. Architecture</h2><p>Built on a topic-based messaging model with persistent storage:</p><ul><li><strong>Channel Service</strong> - Manages channel lifecycle, membership, and ACLs</li><li><strong>Message Broker</strong> - Handles message routing, delivery, and persistence</li><li><strong>Replay Engine</strong> - Enables historical message retrieval and search</li></ul><h2>3. Message Format</h2><p>Messages use a structured envelope with metadata, payload, and routing information. Supports text, structured data, and binary attachments.</p>',

    id: 'd3', title: 'TSC-2026-04: GraphQL Federation Strategy', type: 'tsc', status: 'review',
    description: 'Decision record for adopting Apollo Federation v2 as the standard for service composition.',
    content: '<h1>TSC-2026-04: GraphQL Federation Strategy</h1><h2>Status</h2><p><strong>Proposed</strong> - Under review by TSC</p><h2>Context</h2><p>As the platform grows, we need a consistent approach to composing GraphQL schemas across microservices. The current approach of manual schema stitching is error-prone and does not scale.</p><h2>Decision</h2><p>Adopt Apollo Federation v2 as the standard for GraphQL service composition. Each service owns its subgraph and extends shared types via federation directives.</p><h2>Options Considered</h2><h3>Option A: Apollo Federation v2</h3><p>Pros: Mature ecosystem, good tooling, declarative composition. Cons: Vendor dependency, learning curve.</p><h3>Option B: Schema Stitching</h3><p>Pros: No vendor dependency. Cons: Manual, error-prone, poor type safety.</p><h3>Option C: Single Monolithic Schema</h3><p>Pros: Simple. Cons: Does not scale, coupling.</p><h2>Consequences</h2><p>All new services must publish a federation-compatible subgraph. Existing services will be migrated incrementally.</p>',
    tags: ['t1', 't5'], author: 'u2', collaborators: ['u1', 'u4'],
    createdAt: '2026-04-03', updatedAt: '2026-04-07',
    versions: [
      { id: 'v1', label: 'Initial proposal', author: 'u2', date: '2026-04-03', additions: 198, deletions: 0 }

    comments: [

    description: 'Design for the token exchange mechanism between user tokens and service-scoped tokens for MCP tool access.',
    content: '<h1>OAuth2 Token Exchange Flow</h1><h2>1. Overview</h2><p>The token exchange flow enables secure delegation of user credentials to agent-scoped tokens. This is critical for MCP tools that need to act on behalf of a user while maintaining least-privilege access.</p><h2>2. Flow</h2><p>1. User authenticates via Keycloak<br>2. BFF exchanges user token for agent-scoped token<br>3. Agent-scoped token is passed to executor<br>4. Executor uses token for MCP tool calls<br>5. Token is scoped to specific tools and tenant</p><h2>3. Security</h2><p>Agent tokens have reduced scope and short TTL. All token exchanges are logged for audit. RLS policies on the supergraph enforce tenant boundaries.</p>',

    description: 'Decision to use a lightweight registry:2 instance for agent app builds instead of GHCR for internal images.',
    content: '<h1>TSC-2026-03: Container Registry Strategy</h1><h2>Status</h2><p><strong>Accepted</strong></p><h2>Context</h2><p>Agent apps need fast image builds and pulls within the cluster. GHCR adds latency and requires external network access from build nodes.</p><h2>Decision</h2><p>Deploy a lightweight Docker registry:2 at docker-registry:5000 for internal agent app images. GHCR remains for public/shared images.</p><h2>Consequences</h2><p>Build times reduced significantly. No external dependency for agent app deployments. Images are ephemeral and rebuilt from source.</p>',

// ============================================================
// STATE MANAGEMENT
// ============================================================
class Store {
  constructor() {
    this.data = this.load();
  }

  load() {
    try {
      const saved = localStorage.getItem('hld-tsc-store');
      if (saved) {
        const parsed = JSON.parse(saved);
        // Migration: ensure all fields exist
        if (!parsed.schemas) parsed.schemas = defaultSchemas;
        return parsed;
      }
    } catch(e) {}
    return {
      users: defaultUsers,
      tags: defaultTags,
      templates: defaultTemplates,
      documents: defaultDocuments,
      schemas: defaultSchemas,
      currentUser: 'u1'
    };
  }

  save() {
    try { localStorage.setItem('hld-tsc-store', JSON.stringify(this.data)); } catch(e) {}
  }

  getUser(id) { return this.data.users.find(u => u.id === id) || this.data.users[0]; }
  getTag(id) { return this.data.tags.find(t => t.id === id); }
  getCurrentUser() { return this.getUser(this.data.currentUser); }
  getDocuments() { return this.data.documents; }
  getDocument(id) { return this.data.documents.find(d => d.id === id); }
  getTemplates() { return this.data.templates; }
  getTemplate(id) { return this.data.templates.find(t => t.id === id); }

  addDocument(doc) {
    this.data.documents.unshift(doc);
    this.save();
  }

  updateDocument(id, updates) {
    const idx = this.data.documents.findIndex(d => d.id === id);
    if (idx >= 0) {
      Object.assign(this.data.documents[idx], updates);
      this.save();
    }
  }

  deleteDocument(id) {
    this.data.documents = this.data.documents.filter(d => d.id !== id);
    this.save();
  }

  addComment(docId, comment) {
    const doc = this.getDocument(docId);
    if (doc) {
      doc.comments.push(comment);
      this.save();
    }
  }

  addReply(docId, commentId, reply) {
    const doc = this.getDocument(docId);
    if (doc) {
      const comment = doc.comments.find(c => c.id === commentId);
      if (comment) {
        comment.replies.push(reply);
        this.save();
      }
    }
  }

  toggleResolve(docId, commentId) {
    const doc = this.getDocument(docId);
    if (doc) {
      const comment = doc.comments.find(c => c.id === commentId);
      if (comment) {
        comment.resolved = !comment.resolved;
        this.save();
      }
    }
  }

  addReview(docId, review) {
    const doc = this.getDocument(docId);
    if (doc) {
      const existing = doc.reviews.findIndex(r => r.reviewer === review.reviewer);
      if (existing >= 0) {
        doc.reviews[existing] = review;
      } else {
        doc.reviews.push(review);
      }
      // Auto-advance status
      const allApproved = doc.reviews.length >= 2 && doc.reviews.every(r => r.status === 'approved');
      if (allApproved) doc.status = 'approved';
      else if (doc.reviews.some(r => r.status !== 'pending')) doc.status = 'review';
      this.save();
    }
  }

  addVersion(docId, version) {
    const doc = this.getDocument(docId);
    if (doc) {
      doc.versions.push(version);
      this.save();
    }
  }

  generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
}

const store = new Store();

let currentPage = 'dashboard';

function navigate(page, docId) {
  currentPage = page;
  currentDocId = docId || null;

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  // Close mobile sidebar
  closeSidebar();

  renderPage();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}

function renderPage() {
  const content = document.getElementById('content');
  const title = document.getElementById('pageTitle');
  const actions = document.getElementById('topbarActions');

  // Update counts
  document.getElementById('docCount').textContent = store.getDocuments().length;
  const pendingReviews = store.getDocuments().filter(d => d.status === 'review').length;
  document.getElementById('reviewCount').textContent = pendingReviews;

  switch(currentPage) {
    case 'dashboard': renderDashboard(content, title, actions); break;
    case 'documents': renderDocuments(content, title, actions); break;
    case 'editor': renderEditor(content, title, actions); break;
    case 'templates': renderTemplates(content, title, actions); break;
    case 'reviews': renderReviews(content, title, actions); break;
    case 'visualizer': renderVisualizer(content, title, actions); break;
    case 'features': renderFeatures(content, title, actions); break;
    default: renderDashboard(content, title, actions);
  }
}

function renderEditorSidebar() {

  if (!container) return;

  if (editorSidebarTab === 'comments') {
    const comments = doc.comments || [];

        const author = store.getUser(c.author);
        return `<div class="comment-thread">
          <div class="comment ${c.resolved?'resolved':''}">
            <div class="comment-header">
              <div class="comment-avatar" style="background:${author.color}">${author.initials}</div>
              <span class="comment-author">${author.name}</span>
              <span class="comment-time">${formatDate(c.date)}</span>

            <div class="comment-body">${escapeHtml(c.text)}</div>
            <div class="comment-actions">
              <button class="comment-action" onclick="toggleResolveComment('${doc.id}','${c.id}')">${c.resolved?'Reopen':'Resolve'}</button>
              <button class="comment-action" onclick="showReplyInput('${c.id}')">Reply</button>
            </div>
          </div>
          ${(c.replies||[]).map(r => {

function toggleEditorSidebar() {
  const sidebar = document.getElementById('editorSidebar');
  if (sidebar) sidebar.classList.toggle('mobile-open');
}

function execCmd(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('editorArea').focus();
}

function updateDocTitle() {
  const titleInput = document.getElementById('editorTitle');
  if (titleInput && currentDocId) {
    store.updateDocument(currentDocId, { title: titleInput.value, updatedAt: today() });
  }
}

let autoSaveTimer = null;
function autoSaveDraft() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    saveDocument(true);
  }, 2000);
}

function saveDocument(silent) {
  const area = document.getElementById('editorArea');
  const titleInput = document.getElementById('editorTitle');
  if (!area || !currentDocId) return;
  store.updateDocument(currentDocId, {
    content: area.innerHTML,
    title: titleInput ? titleInput.value : undefined,
    updatedAt: today()
  });
  if (!silent) showToast('Document saved', 'success');
}

function submitForReview(docId) {
  store.updateDocument(docId, { status: 'review', updatedAt: today() });
  store.addReview(docId, { reviewer: 'u2', status: 'pending', date: null, comment: null });
  store.addReview(docId, { reviewer: 'u4', status: 'pending', date: null, comment: null });
  showToast('Submitted for review', 'success');
  renderPage();
}

function approveDocument(docId) {
  const user = store.getCurrentUser();
  store.addReview(docId, { reviewer: user.id, status: 'approved', date: today(), comment: 'Approved.' });
  showToast('Review submitted', 'success');
  renderPage();
}

function addComment(docId) {
  const textarea = document.getElementById('newCommentText');
  if (!textarea || !textarea.value.trim()) return;
  const user = store.getCurrentUser();
  store.addComment(docId, {
    id: store.generateId(),
    author: user.id,
    text: textarea.value.trim(),
    date: today(),
    resolved: false,
    replies: []
  });
  renderEditorSidebar();
}

function showReplyInput(commentId) {
  const el = document.getElementById('reply-' + commentId);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function addReply(docId, commentId) {
  const textarea = document.getElementById('reply-text-' + commentId);
  if (!textarea || !textarea.value.trim()) return;
  const user = store.getCurrentUser();
  store.addReply(docId, commentId, {
    id: store.generateId(),
    author: user.id,
    text: textarea.value.trim(),
    date: today()
  });
  renderEditorSidebar();
}

function toggleResolveComment(docId, commentId) {
  store.toggleResolve(docId, commentId);
  renderEditorSidebar();
}

function createFromTemplate(templateId) {

    id: store.generateId(),
    title: template.name.replace('Template', '').trim() + ' - New',
    type: template.type,
    status: 'draft',
    description: 'Created from template: ' + template.name,
    content: template.content,
    tags: [],
    author: user.id,
    collaborators: [],
    createdAt: today(),
    updatedAt: today(),
    versions: [{ id: store.generateId(), label: 'Created from template', author: user.id, date: today(), additions: 100, deletions: 0 }],
    comments: [],
    reviews: []

// ---- REVIEWS ----
function renderReviews(content, title, actions) {
  title.textContent = 'Reviews';
  actions.innerHTML = '';

  const docs = store.getDocuments();
  const pending = docs.filter(d => d.status === 'review');
  const approved = docs.filter(d => d.status === 'approved');

  content.innerHTML = `
    <div class="tabs">
      <div class="tab active" onclick="switchReviewTab(this,'pending')">Pending (${pending.length})</div>
      <div class="tab" onclick="switchReviewTab(this,'approved')">Approved (${approved.length})</div>
    </div>
    <div id="reviewContent">
      <div class="review-list">
        ${pending.length === 0 ? '<div class="empty-state"><h3>No pending reviews</h3><p>All documents have been reviewed.</p></div>' :
          pending.map(d => renderReviewCard(d)).join('')
        }
      </div>
    </div>
  `;

function switchReviewTab(el, tab) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const docs = store.getDocuments();
  const list = tab === 'pending' ? docs.filter(d => d.status === 'review') : docs.filter(d => d.status === 'approved');

  document.getElementById('reviewContent').innerHTML = `
    <div class="review-list">
      ${list.length === 0 ? `<div class="empty-state"><h3>No ${tab} reviews</h3></div>` :
        list.map(d => renderReviewCard(d)).join('')
      }
    </div>
  `;
}

function renderReviewCard(d) {
  const author = store.getUser(d.author);
  const reviewers = (d.reviews || []).map(r => {
    const rev = store.getUser(r.reviewer);
    return `<span class="reviewer-status ${r.status}" style="font-size:11px">${rev.initials}: ${r.status}</span>`;
  }).join(' &middot; ');

  return `<div class="card card-clickable review-card" onclick="navigate('editor','${d.id}')">
    <div class="doc-icon ${d.type}" style="align-self:flex-start">
      ${d.type === 'hld' ?
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' :
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>'

    <div class="review-card-body">
      <div class="review-card-title">${escapeHtml(d.title)}</div>
      <div class="review-card-meta">

let currentSchemaText = '';

function renderVisualizer(content, title, actions) {
  title.textContent = 'DB Visualizer';
  actions.innerHTML = '';

  const schemas = store.data.schemas || [];

  content.innerHTML = `
    <div class="visualizer-layout">
      <div class="schema-examples">
        <span style="font-size:12px;color:var(--text-muted);align-self:center">Load example:</span>
        ${schemas.map(s => `<button class="btn btn-secondary btn-sm" onclick="loadSchema('${s.id}')">${escapeHtml(s.name)}</button>`).join('')}
      </div>
      <div class="schema-input-area">
        <div class="schema-input-header">
          <h4>Mermaid ER Diagram</h4>
          <button class="btn btn-primary btn-sm" onclick="renderDiagram()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Render
          </button>
        </div>
        <textarea class="schema-textarea" id="schemaInput" placeholder="Enter Mermaid ER diagram syntax...

Example:
erDiagram
    USERS {
        uuid id PK
        varchar name
    }
    POSTS {
        uuid id PK
        uuid author_id FK
        text content
    }
    USERS ||--o{ POSTS : writes">${currentSchemaText}</textarea>
      </div>
      <div class="diagram-output" id="diagramOutput">
        <div style="color:var(--text-muted);font-size:13px">Enter a Mermaid ER diagram above and click Render</div>
      </div>
    </div>
  `;

  // Auto-render if there's content
  if (currentSchemaText) {
    setTimeout(() => renderDiagram(), 100);
  }
}

function loadSchema(schemaId) {
  const schema = (store.data.schemas || []).find(s => s.id === schemaId);
  if (!schema) return;
  currentSchemaText = schema.schema;
  const input = document.getElementById('schemaInput');
  if (input) input.value = currentSchemaText;
  renderDiagram();
}

function renderDiagram() {
  const input = document.getElementById('schemaInput');
  const output = document.getElementById('diagramOutput');
  if (!input || !output) return;

  currentSchemaText = input.value;
  if (!currentSchemaText.trim()) {
    output.innerHTML = '<div style="color:var(--text-muted);font-size:13px">Enter a Mermaid ER diagram above and click Render</div>';
    return;
  }

  output.innerHTML = '<div class="mermaid">' + currentSchemaText + '</div>';

  try {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#4c7bf5',
        primaryTextColor: '#e8ecf4',
        primaryBorderColor: '#2d3548',
        lineColor: '#5a6478',
        secondaryColor: '#242b3d',
        tertiaryColor: '#1e2538'
      }
    });
    mermaid.run({ querySelector: '#diagramOutput .mermaid' });
  } catch(e) {
    output.innerHTML = `<div style="color:var(--danger);font-size:13px">Error rendering diagram: ${escapeHtml(e.message)}</div>`;
  }
}

      <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">The application is designed with the following database schema. Visit the DB Visualizer to see the full ER diagram.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">
        ${['documents','document_versions','templates','comments','reviews','users','tags','document_tags','db_schemas'].map(t =>
          `<div style="padding:8px 12px;background:var(--bg-tertiary);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-mono);color:var(--accent)">${t}</div>`
        ).join('')}
      </div>
    </div>
  `;
}

// ---- NEW DOCUMENT MODAL ----
function showNewDocModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'newDocModal';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>New Document</h3>
        <button class="btn-icon" onclick="document.getElementById('newDocModal').remove()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="newDocTitle" placeholder="Enter document title...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select id="newDocType">
              <option value="hld">HLD - High-Level Design</option>
              <option value="tsc">TSC - Steering Committee</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="newDocDesc" rows="3" placeholder="Brief description of the document..."></textarea>
        </div>
        <div class="form-group">
          <label>Or start from a template</label>
          <select id="newDocTemplate">
            <option value="">Blank document</option>
            ${store.getTemplates().map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('newDocModal').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createNewDoc()">Create</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  document.getElementById('newDocTitle').focus();
}

function createNewDoc() {
  const title = document.getElementById('newDocTitle').value.trim();
  const type = document.getElementById('newDocType').value;
  const desc = document.getElementById('newDocDesc').value.trim();
  const templateId = document.getElementById('newDocTemplate').value;

  if (!title) { showToast('Please enter a title', 'error'); return; }

  const user = store.getCurrentUser();
  let content = '<h1>' + escapeHtml(title) + '</h1><p>Start writing here...</p>';

  if (templateId) {
    const tpl = store.getTemplate(templateId);
    if (tpl) content = tpl.content;
  }

  const doc = {
    id: store.generateId(),
    title,
    type,
    status: 'draft',
    description: desc || 'No description',
    content,
    tags: [],
    author: user.id,
    collaborators: [],
    createdAt: today(),
    updatedAt: today(),
    versions: [{ id: store.generateId(), label: 'Initial draft', author: user.id, date: today(), additions: 50, deletions: 0 }],
    comments: [],
    reviews: []
  };

  store.addDocument(doc);
  document.getElementById('newDocModal').remove();
  showToast('Document created', 'success');
  navigate('editor', doc.id);
}

// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const now = new Date();
    const diffMs = now - d;
    const diffDays = Math.floor(diffMs / (1000*60*60*24));
    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    if (diffDays < 7) return diffDays + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch(e) { return dateStr; }
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function showToast(message, type) {
  const container = document.getElementById('toasts');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
