<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HLD & TSC Review</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
/* ============================================================
   CSS VARIABLES & THEME
   ============================================================ */
:root {
  --bg-primary: #0f1419;
  --bg-secondary: #1a1f2e;
  --bg-tertiary: #242b3d;
  --bg-card: #1e2538;
  --bg-hover: #2a3349;
  --bg-input: #151a27;
  --border: #2d3548;
  --border-focus: #4c7bf5;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a8;
  --text-muted: #5a6478;
  --text-link: #6fa1f8;
  --accent: #4c7bf5;
  --accent-hover: #6b93f7;
  --accent-muted: rgba(76, 123, 245, 0.15);
  --accent-glow: rgba(76, 123, 245, 0.3);
  --success: #3dd68c;
  --success-bg: rgba(61, 214, 140, 0.12);
  --warning: #f5a623;
  --warning-bg: rgba(245, 166, 35, 0.12);
  --danger: #f5564a;
  --danger-bg: rgba(245, 86, 74, 0.12);
  --info: #4cc9f0;
  --info-bg: rgba(76, 201, 240, 0.12);
  --purple: #a78bfa;
  --purple-bg: rgba(167, 139, 250, 0.12);
  --orange: #fb923c;
  --orange-bg: rgba(251, 146, 60, 0.12);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow: 0 2px 8px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.35);
  --transition: 0.2s ease;
  --sidebar-width: 260px;
  --header-height: 56px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Oxygen, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { height: 100%; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============================================================
   APP LAYOUT
   ============================================================ */
.app {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 200;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: var(--header-height);
}

.sidebar-logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}

.sidebar-brand {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.sidebar-brand h2 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.sidebar-brand small {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 10px;
  overflow-y: auto;
}

.nav-section {
  margin-bottom: 8px;
}
.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 8px 12px 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
  user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--accent-muted);
  color: var(--accent);
}
.nav-item svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  opacity: 0.7;
}
.nav-item.active svg { opacity: 1; }
.nav-item .badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px;
  border-radius: var(--radius-sm);
}
.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: #fff;
  flex-shrink: 0;
}
.sidebar-user-info {
  min-width: 0;
}
.sidebar-user-info .name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-user-info .role {
  font-size: 11px;
  color: var(--text-muted);
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

.topbar {
  height: var(--header-height);
  min-height: var(--header-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  z-index: 100;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 4px;
}
.menu-toggle svg { width: 22px; height: 22px; }

.topbar-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
}

/* ============================================================
   COMMON COMPONENTS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  white-space: nowrap;
  user-select: none;
}
.btn svg { width: 16px; height: 16px; }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--border);
}
.btn-secondary:hover { background: var(--bg-hover); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border-color: transparent;
}
.btn-ghost:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon {
  padding: 6px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
}
.btn-icon:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.btn-icon svg { width: 18px; height: 18px; }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-danger:hover { opacity: 0.85; }
.btn-success { background: var(--success); color: #000; border-color: var(--success); }

.badge-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.badge-draft { background: var(--info-bg); color: var(--info); }
.badge-review { background: var(--warning-bg); color: var(--warning); }
.badge-approved { background: var(--success-bg); color: var(--success); }
.badge-archived { background: rgba(255,255,255,0.06); color: var(--text-muted); }
.badge-changes { background: var(--orange-bg); color: var(--orange); }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.card:hover {
  border-color: var(--accent-glow);
}
.card-clickable { cursor: pointer; }
.card-clickable:hover { box-shadow: var(--shadow); }

input[type="text"], input[type="search"], textarea, select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: inherit;
  transition: border-color var(--transition);
  width: 100%;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-muted);
}

.search-box {
  position: relative;
  max-width: 300px;
}
.search-box svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
}
.search-box input { padding-left: 32px; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: var(--accent-muted);
  color: var(--accent);
}

/* ============================================================
   TABS
   ============================================================ */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all var(--transition);
  user-select: none;
}
.tab:hover { color: var(--text-secondary); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-body { padding: 20px; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ============================================================
   PAGE: DASHBOARD
   ============================================================ */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.stat-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

.activity-feed { display: flex; flex-direction: column; gap: 8px; }
.activity-item {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  font-size: 13px;
}
.activity-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}
.activity-content { flex: 1; min-width: 0; }
.activity-content .activity-text { color: var(--text-secondary); }
.activity-content .activity-text strong { color: var(--text-primary); font-weight: 600; }
.activity-content .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.recent-docs { display: flex; flex-direction: column; gap: 8px; }
.doc-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  cursor: pointer;
  transition: background var(--transition);
}
.doc-row:hover { background: var(--bg-hover); }
.doc-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.doc-icon svg { width: 18px; height: 18px; }
.doc-icon.hld { background: var(--accent-muted); color: var(--accent); }
.doc-icon.tsc { background: var(--purple-bg); color: var(--purple); }
.doc-icon.db { background: var(--success-bg); color: var(--success); }
.doc-row-info { flex: 1; min-width: 0; }
.doc-row-info .doc-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.doc-row-info .doc-meta {
  font-size: 11px;
  color: var(--text-muted);
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

/* ============================================================
   PAGE: DOCUMENTS
   ============================================================ */
.doc-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-chip {
  padding: 5px 12px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text-primary); }
.filter-chip.active { background: var(--accent-muted); border-color: var(--accent); color: var(--accent); }

.doc-list { display: flex; flex-direction: column; gap: 10px; }

.doc-card {
  display: flex;
  gap: 12px;
  padding: 14px;
  cursor: pointer;
}
.doc-card-body { flex: 1; min-width: 0; }
.doc-card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.doc-card-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.doc-card-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.doc-card-footer .avatar-sm {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 600;
  color: #fff;
  margin-right: -4px;
}
.doc-card-footer .meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 8px;
}

/* ============================================================
   PAGE: EDITOR
   ============================================================ */
.editor-layout {
  display: flex;
  gap: 0;
  height: calc(100vh - var(--header-height) - 40px);
  margin: -20px;
}

.editor-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--border);
}

.editor-toolbar {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-wrap: wrap;
}
.editor-toolbar .divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}

.editor-title-input {
  font-size: 22px;
  font-weight: 700;
  padding: 16px 20px 8px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  width: 100%;
  outline: none;
}
.editor-title-input::placeholder { color: var(--text-muted); }

.editor-area {
  flex: 1;
  padding: 0 20px 20px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.7;
  outline: none;
  min-height: 200px;
  color: var(--text-primary);
}
.editor-area:empty::before {
  content: "Start writing your document...";
  color: var(--text-muted);
}
.editor-area h1 { font-size: 24px; margin: 16px 0 8px; }
.editor-area h2 { font-size: 20px; margin: 14px 0 6px; }
.editor-area h3 { font-size: 17px; margin: 12px 0 4px; }
.editor-area h4 { font-size: 15px; margin: 10px 0 4px; font-weight: 600; }
.editor-area p { margin-bottom: 8px; }
.editor-area ul, .editor-area ol { margin: 8px 0 8px 20px; }
.editor-area blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}
.editor-area code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 13px;
}
.editor-area pre {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
}
.editor-area pre code { background: transparent; padding: 0; }
.editor-area table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 13px;
}
.editor-area table th, .editor-area table td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.editor-area table th {
  background: var(--bg-tertiary);
  font-weight: 600;
}
.editor-area hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

.editor-sidebar {
  width: 300px;
  display: flex;
  flex-direction: column;
  background: var(--bg-secondary);
  overflow: hidden;
}
.editor-sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.editor-sidebar-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
}
.editor-sidebar-tab:hover { color: var(--text-secondary); }
.editor-sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.editor-sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* Comments */
.comment-thread {
  margin-bottom: 12px;
}
.comment {
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 6px;
}
.comment-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.comment-avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;

<script>
// ============================================================
// DATABASE API LAYER
// ============================================================
const DB_ENDPOINT = 'https://hq.herodevs.dev/graphql';
const DB_TOKEN = 'hdapp_14XB0jPjYLAiG59oHIP5c507SCpJJmMrQ2EdXaAaXHy6ZGr1';

const DB = {
  async query(sql) {
    try {
      const res = await fetch(DB_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + DB_TOKEN
        },
        body: JSON.stringify({
          query: `mutation { datasourceMutations { query(sql: ${JSON.stringify(sql)}) { columns rows } } }`
        })
      });
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      const result = json.data.datasourceMutations.query;
      // Convert rows array-of-arrays to array-of-objects using columns
      const cols = result.columns;
      return result.rows.map(row => {
        const obj = {};
        cols.forEach((col, i) => { obj[col] = row[i]; });
        return obj;
      });
    } catch (e) {
      console.error('DB.query error:', e, 'SQL:', sql);
      throw e;
    }
  },

  async mutate(sql) {
    try {
      const res = await fetch(DB_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + DB_TOKEN
        },
        body: JSON.stringify({
          query: `mutation { datasourceMutations { mutate(sql: ${JSON.stringify(sql)}) { rowsAffected } } }`
        })
      });
      const json = await res.json();
      if (json.errors) throw new Error(json.errors[0].message);
      return json.data.datasourceMutations.mutate;
    } catch (e) {
      console.error('DB.mutate error:', e, 'SQL:', sql);
      throw e;
    }
  },

  escape(str) {
    if (str === null || str === undefined) return 'NULL';
    return String(str).replace(/'/g, "''");
  },

  // --- Document helpers ---
  async getDocuments() {
    return await DB.query("SELECT * FROM hld_documents ORDER BY updated_at DESC");
  },

  async getDocument(id) {
    const rows = await DB.query(`SELECT * FROM hld_documents WHERE id = '${DB.escape(id)}'`);
    return rows[0] || null;
  },

  async createDocument(doc) {
    const tags = doc.tags ? `'${DB.escape(JSON.stringify(doc.tags))}'::jsonb` : "'[]'::jsonb";
    const related = doc.related_doc_ids ? `'${DB.escape(JSON.stringify(doc.related_doc_ids))}'::jsonb` : "'[]'::jsonb";
    const sql = `INSERT INTO hld_documents (id, title, type, status, content, author, related_doc_ids, tags, created_at, updated_at) VALUES ('${DB.escape(doc.id)}', '${DB.escape(doc.title)}', '${DB.escape(doc.type)}', '${DB.escape(doc.status)}', '${DB.escape(doc.content)}', '${DB.escape(doc.author)}', ${related}, ${tags}, now(), now())`;
    return await DB.mutate(sql);
  },

  async updateDocument(id, fields) {
    const sets = [];
    if (fields.title !== undefined) sets.push(`title = '${DB.escape(fields.title)}'`);
    if (fields.type !== undefined) sets.push(`type = '${DB.escape(fields.type)}'`);
    if (fields.status !== undefined) sets.push(`status = '${DB.escape(fields.status)}'`);
    if (fields.content !== undefined) sets.push(`content = '${DB.escape(fields.content)}'`);
    if (fields.author !== undefined) sets.push(`author = '${DB.escape(fields.author)}'`);
    if (fields.tags !== undefined) sets.push(`tags = '${DB.escape(JSON.stringify(fields.tags))}'::jsonb`);
    if (fields.related_doc_ids !== undefined) sets.push(`related_doc_ids = '${DB.escape(JSON.stringify(fields.related_doc_ids))}'::jsonb`);
    sets.push("updated_at = now()");
    if (sets.length === 1) return; // only updated_at
    const sql = `UPDATE hld_documents SET ${sets.join(', ')} WHERE id = '${DB.escape(id)}'`;
    return await DB.mutate(sql);
  },

  async deleteDocument(id) {
    return await DB.mutate(`DELETE FROM hld_documents WHERE id = '${DB.escape(id)}'`);
  },

  // --- Version helpers ---
  async getVersions(docId) {
    return await DB.query(`SELECT * FROM hld_document_versions WHERE document_id = '${DB.escape(docId)}' ORDER BY version_number ASC`);
  },

  async createVersion(docId, content, summary, author) {
    const id = crypto.randomUUID();
    // Get next version number
    const existing = await DB.query(`SELECT COALESCE(MAX(version_number), 0) as max_v FROM hld_document_versions WHERE document_id = '${DB.escape(docId)}'`);
    const nextVersion = (parseInt(existing[0]?.max_v) || 0) + 1;
    const sql = `INSERT INTO hld_document_versions (id, document_id, version_number, content, change_summary, author, created_at) VALUES ('${DB.escape(id)}', '${DB.escape(docId)}', ${nextVersion}, '${DB.escape(content)}', '${DB.escape(summary || 'Updated')}', '${DB.escape(author || 'Ryan Murphy')}', now())`;
    return await DB.mutate(sql);
  },

  // --- Comment helpers ---
  async getComments(docId) {
    return await DB.query(`SELECT * FROM hld_comments WHERE document_id = '${DB.escape(docId)}' AND table_name IS NULL ORDER BY created_at ASC`);
  },

  async getTableComments(tableName) {
    return await DB.query(`SELECT * FROM hld_comments WHERE table_name = '${DB.escape(tableName)}' ORDER BY created_at ASC`);
  },

  async addComment(docId, tableName, parentId, author, text) {
    const id = crypto.randomUUID();
    const docVal = docId ? `'${DB.escape(docId)}'` : 'NULL';
    const tableVal = tableName ? `'${DB.escape(tableName)}'` : 'NULL';
    const parentVal = parentId ? `'${DB.escape(parentId)}'` : 'NULL';
    const sql = `INSERT INTO hld_comments (id, document_id, table_name, parent_id, author, text, resolved, created_at) VALUES ('${DB.escape(id)}', ${docVal}, ${tableVal}, ${parentVal}, '${DB.escape(author)}', '${DB.escape(text)}', false, now())`;
    await DB.mutate(sql);
    return id;
  },

  async resolveComment(commentId, resolved) {
    return await DB.mutate(`UPDATE hld_comments SET resolved = ${resolved} WHERE id = '${DB.escape(commentId)}'`);
  },

  // --- Review helpers ---
  async getReviews(docId) {
    return await DB.query(`SELECT * FROM hld_reviews WHERE document_id = '${DB.escape(docId)}' ORDER BY created_at ASC`);
  },

  async addReview(docId, reviewer, status, comment) {
    const id = crypto.randomUUID();
    const sql = `INSERT INTO hld_reviews (id, document_id, reviewer, status, comment, created_at, updated_at) VALUES ('${DB.escape(id)}', '${DB.escape(docId)}', '${DB.escape(reviewer)}', '${DB.escape(status)}', '${DB.escape(comment || '')}', now(), now())`;
    return await DB.mutate(sql);
  },

  async updateReview(reviewId, status, comment) {
    const sets = [`status = '${DB.escape(status)}'`, "updated_at = now()"];
    if (comment !== undefined) sets.push(`comment = '${DB.escape(comment)}'`);
    return await DB.mutate(`UPDATE hld_reviews SET ${sets.join(', ')} WHERE id = '${DB.escape(reviewId)}'`);
  }
};

<h2>1. Project Overview</h2>
<p>api2 is a new API service within the <code>nesify-ai-conductor-workflows</code> monorepo that provides a managed registry for Conductor workflow definitions. Its responsibilities:</p>
<ul>
<li><strong>Workflow registration with dedup</strong> -- Accept uploaded workflow definitions, check whether the same workflow (by name + version) already exists, and either ignore duplicates or publish new ones to Conductor.</li>
<li><strong>Workflow listing</strong> -- Expose the current set of registered workflows from both the local Postgres registry and Conductor.</li>
<li><strong>Workflow execution</strong> -- Provide an endpoint to start a registered workflow with user-supplied inputs.</li>
<li><strong>Federated GraphQL subgraph</strong> -- Participate in a federated Apollo schema so other services and the portal can query workflow metadata alongside run data.</li>
</ul>
<p>api2 complements the existing <code>apps/api</code> (the run-management / nesify API) and sits alongside it in the control plane.</p>

<h2>6. Workflow Registration Flow</h2>
<h3>Dedup logic (pseudo-code)</h3>
<pre><code>async function registerWorkflow(definition) {
  const { name, version } = definition;
  if (!name || typeof version !== 'number') {
    throw new ValidationError('Workflow must have name and integer version');
  }

  const existing = await db.query(
    'SELECT * FROM workflow_registry WHERE name = $1 AND version = $2',
    [name, version]
  );

  if (existing.rows.length > 0) {
    return { workflow: existing.rows[0], created: false, deduplicated: true };
  }

  await conductorClient.put({
    url: '/api/metadata/workflow',
    body: [definition],
    query: { overwrite: true },
  });

  const row = await db.query(
    \`INSERT INTO workflow_registry (name, version, description, definition,
       input_parameters, conductor_synced, conductor_synced_at, registered_by)
     VALUES ($1, $2, $3, $4, $5, TRUE, NOW(), $6)
     RETURNING *\`,
    [name, version, definition.description, definition,
     definition.inputParameters ?? [], registeredBy]
  );

  return { workflow: row.rows[0], created: true, deduplicated: false };
}</code></pre>

<h3>Edge cases</h3>
<ul>
<li><strong>Concurrent registration</strong>: The UNIQUE (name, version) constraint acts as a last-resort dedup. Catch Postgres error 23505 and treat as dedup.</li>
<li><strong>Conductor publish fails</strong>: Do NOT insert into Postgres. The registration is atomic.</li>
<li><strong>Definition changes for same name+version</strong>: Treated as immutable. A future enhancement could add a force flag.</li>
</ul>
<hr>

<h2>7. Workflow Execution Flow</h2>
<h3>Implementation notes</h3>
<ul>
<li>If <code>version</code> is omitted, api2 looks up the latest active version from Postgres.</li>
<li>The <code>startWorkflow</code> function from <code>packages/core/src/conductor-api.ts</code> is reused directly.</li>
<li>The execution log insert is fire-and-forget (non-blocking).</li>
<li><code>taskToDomain</code> is passed through to Conductor for domain-based routing.</li>
</ul>

<h2>3. GraphQL Schema Types, Queries, and Mutations</h2>
<p>The full GraphQL schema includes types for Project, ProjectArtifact, PackageVersion, ProjectStage, WorkflowRun, SecurityFix, SecurityFixFile, plus Connection/pagination types, Stats types, and comprehensive Query/Mutation definitions.</p>

<h2>4. Conductor Task Definitions</h2>
<p>Sync tasks for stage management:</p>
<ul>
<li><code>NESIFY_SYNC_PROJECT</code> -- Sync project state after resolve + mirror stages</li>
<li><code>NESIFY_SYNC_STAGE</code> -- Record a stage transition in project_stage table</li>
<li><code>NESIFY_SYNC_SECURITY_FIXES</code> -- Upsert security fixes from analyze + patch output</li>

<h2>5. Example Queries</h2>
<h3>Find a project by package name</h3>
<pre><code>SELECT p.*, ls.stage AS current_stage, ls.status AS current_stage_status
FROM project p
LEFT JOIN LATERAL (
  SELECT ps.stage, ps.status
  FROM project_stage ps WHERE ps.project_id = p.id
  ORDER BY ps.started_at DESC NULLS LAST LIMIT 1
) ls ON TRUE
WHERE p.ecosystem = 'npm' AND p.package_name = 'moment';</code></pre>

<h3>List all CVEs for a project with patch outcomes</h3>
<pre><code>SELECT sf.cve_id, sf.severity, sf.cvss_score, sf.summary,
       sf.patch_outcome, sf.status, sf.prs_opened, sf.tests_passed
FROM security_fix sf
JOIN project p ON p.id = sf.project_id
WHERE p.package_name = 'angular' AND p.ecosystem = 'npm'
ORDER BY
  CASE sf.severity
    WHEN 'CRITICAL' THEN 1 WHEN 'HIGH' THEN 2
    WHEN 'MEDIUM' THEN 3 WHEN 'LOW' THEN 4
  END;</code></pre>

<h3>Dashboard: CVE fix rate by ecosystem</h3>
<pre><code>SELECT p.ecosystem,
       COUNT(DISTINCT sf.id) AS total_cves,
       COUNT(DISTINCT sf.id) FILTER (WHERE sf.patch_outcome = 'patched') AS patched,
       ROUND(100.0 * COUNT(DISTINCT sf.id) FILTER (WHERE sf.patch_outcome = 'patched')
         / NULLIF(COUNT(DISTINCT sf.id), 0), 1) AS patch_rate_pct
FROM security_fix sf
JOIN project p ON p.id = sf.project_id
GROUP BY p.ecosystem ORDER BY total_cves DESC;</code></pre>`;

// ASYNC DATA LOADERS (with caching)
// ============================================================
async function loadDocuments(forceRefresh) {
  if (cache.documents && !forceRefresh) return cache.documents;
  const rows = await DB.getDocuments();
  cache.documents = rows.map(normalizeDoc);
  return cache.documents;
}

async function loadDocument(id, forceRefresh) {
  // Check cache first
  if (!forceRefresh && cache.documents) {
    const cached = cache.documents.find(d => d.id === id);
    if (cached) return cached;
  }
  const row = await DB.getDocument(id);
  if (!row) return null;
  return normalizeDoc(row);
}

function normalizeDoc(row) {
  let tags = [];
  try { tags = typeof row.tags === 'string' ? JSON.parse(row.tags) : (row.tags || []); } catch(e) {}
  let relatedDocIds = [];
  try { relatedDocIds = typeof row.related_doc_ids === 'string' ? JSON.parse(row.related_doc_ids) : (row.related_doc_ids || []); } catch(e) {}
  return {
    id: row.id,
    title: row.title || '',
    type: row.type || 'hld',
    status: row.status || 'draft',
    content: row.content || '',
    author: row.author || 'Ryan Murphy',
    tags: tags,
    relatedDocs: relatedDocIds,
    createdAt: row.created_at,
    updatedAt: row.updated_at
  };
}

async function loadVersions(docId, forceRefresh) {
  if (cache.versions[docId] && !forceRefresh) return cache.versions[docId];
  const rows = await DB.getVersions(docId);
  cache.versions[docId] = rows;
  return rows;
}

async function loadComments(docId, forceRefresh) {
  if (cache.comments[docId] && !forceRefresh) return cache.comments[docId];
  const rows = await DB.getComments(docId);
  // Build threaded comments (parent + replies)
  const topLevel = rows.filter(r => !r.parent_id);
  const replies = rows.filter(r => r.parent_id);
  const threaded = topLevel.map(c => ({
    ...c,
    resolved: c.resolved === true || c.resolved === 'true' || c.resolved === 't',
    replies: replies.filter(r => r.parent_id === c.id)
  }));
  cache.comments[docId] = threaded;
  return threaded;
}

async function loadTableComments(tableName, forceRefresh) {
  if (cache.tableComments[tableName] && !forceRefresh) return cache.tableComments[tableName];
  const rows = await DB.getTableComments(tableName);
  const topLevel = rows.filter(r => !r.parent_id);
  const replies = rows.filter(r => r.parent_id);
  const threaded = topLevel.map(c => ({
    ...c,
    replies: replies.filter(r => r.parent_id === c.id)
  }));
  cache.tableComments[tableName] = threaded;
  return threaded;
}

async function loadReviews(docId, forceRefresh) {
  if (cache.reviews[docId] && !forceRefresh) return cache.reviews[docId];
  const rows = await DB.getReviews(docId);
  cache.reviews[docId] = rows;
  return rows;
}

                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>'
                      }
                    </div>
                    <div class="doc-row-info">
                      <div class="doc-name">${escapeHtml(d.title)}</div>
                      <div class="doc-meta">${escapeHtml(author.name)} &middot; Updated ${formatDate(d.updatedAt)}</div>
                    </div>
                    <span class="badge-status badge-${d.status}">${d.status}</span>
                  </div>`;
                }).join('')}
                ${recentDocs.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">No documents yet. Create your first one!</div>' : ''}
              </div>
            </div>
          </div>

          <div>
            <div class="section-header">
              <h3>Stats</h3>
            </div>
            <div class="activity-feed">
              <div class="activity-item">
                <div class="activity-avatar" style="background:#4c7bf5">RM</div>
                <div class="activity-content">
                  <div class="activity-text"><strong>${docs.length}</strong> documents, <strong>${totalComments}</strong> comments, <strong>${drafts}</strong> drafts</div>
                  <div class="activity-time">Database-backed</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    } catch (e) {
      showError(content, 'Failed to load dashboard: ' + e.message, "renderPage()");
    }
  })();
}

// ---- DOCUMENTS ----
let docFilter = 'all';
let docSearch = '';

function renderDocuments(content, title, actions) {
  title.textContent = 'Documents';
  actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="showNewDocModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New
  </button>`;

  // Show filters immediately, then load docs async
  content.innerHTML = `
    <div class="search-box" style="margin-bottom:12px;max-width:100%">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" placeholder="Search documents..." value="${escapeHtml(docSearch)}" oninput="docSearch=this.value;renderPage()">
    </div>
    <div class="doc-filters">
      ${['all','draft','review','approved','hld','db'].map(f =>
        `<div class="filter-chip ${docFilter===f?'active':''}" onclick="docFilter='${f}';renderPage()">${f==='all'?'All':f==='hld'?'HLD':f==='tsc'?'TSC':f==='db'?'Database':f.charAt(0).toUpperCase()+f.slice(1)}</div>`
      ).join('')}
    </div>
    <div class="doc-list" id="docListContent"><div class="loading-spinner"><div class="spinner"></div>Loading documents...</div></div>
  `;

  (async () => {
    try {
      let docs = await loadDocuments();

      if (docFilter !== 'all') {
        if (['draft','review','approved','archived'].includes(docFilter)) {
          docs = docs.filter(d => d.status === docFilter);
        } else if (docFilter === 'hld' || docFilter === 'tsc' || docFilter === 'db') {
          docs = docs.filter(d => d.type === docFilter);
        }
      }

      if (docSearch) {
        const q = docSearch.toLowerCase();
        docs = docs.filter(d => (d.title || '').toLowerCase().includes(q) || (d.content || '').toLowerCase().includes(q));
      }

      const listEl = document.getElementById('docListContent');
      if (!listEl || currentPage !== 'documents') return;

      await updateSidebarCounts();

      listEl.innerHTML = docs.length === 0 ?
        `<div class="empty-state"><h3>No documents found</h3><p>Try adjusting your filters or create a new document.</p></div>` :
        docs.map(d => {
          const author = store.getUserByName(d.author) || store.users[0];
          const tags = (d.tags || []).map(t => typeof t === 'string' && t.startsWith('t') ? store.getTag(t) : store.getTagByName(t)).filter(Boolean);
          const iconClass = d.type === 'db' ? 'db' : d.type === 'tsc' ? 'tsc' : 'hld';
          return `<div class="card card-clickable doc-card" onclick="navigate('editor','${d.id}')">
            <div class="doc-icon ${iconClass}" style="align-self:flex-start">
              ${d.type === 'db' ?
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>' :
              d.type === 'hld' ?
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' :
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>'
              }
            </div>
            <div class="doc-card-body">
              <div class="doc-card-title">${escapeHtml(d.title)}</div>
              <div class="doc-card-desc">${escapeHtml((d.content || '').replace(/<[^>]*>/g, '').slice(0, 200))}</div>
              <div class="doc-card-footer">
                <span class="badge-status badge-${d.status}">${d.status}</span>
                ${tags.map(t => `<span class="tag" style="background:${t.color}20;color:${t.color}">${t.name}</span>`).join('')}
                <span class="meta">${escapeHtml(author.name)} &middot; ${formatDate(d.updatedAt)}</span>
              </div>
            </div>
          </div>`;
        }).join('');
    } catch (e) {
      const listEl = document.getElementById('docListContent');
      if (listEl) listEl.innerHTML = `<div class="error-banner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span>Failed to load documents: ${escapeHtml(e.message)}</span><button class="retry-btn" onclick="renderPage()">Retry</button></div>`;
    }
  })();
}

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>

        <button class="btn btn-secondary btn-sm" onclick="navigate('documents')">

              <button class="btn-icon" onclick="execCmd('underline')" title="Underline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>

              ${doc.status === 'review' ? `<button class="btn btn-sm btn-success" onclick="approveDocument('${doc.id}')">Approve</button>` : ''}
            </div>
            <input class="editor-title-input" id="editorTitle" value="${escapeHtml(doc.title)}" placeholder="Document title..." onchange="updateDocTitle()">
            <div class="editor-area" id="editorArea" contenteditable="true" oninput="autoSaveDraft()">${doc.content}</div>

          <div class="editor-sidebar" id="editorSidebar">

function renderEditorSidebar() {
  if (!currentDocId || !currentEditorDoc) return;
  const container = document.getElementById('editorSidebarContent');
  if (!container) return;
  const doc = currentEditorDoc;

  container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

  if (editorSidebarTab === 'comments') {
    (async () => {
      try {
        const comments = await loadComments(doc.id);
        if (!document.getElementById('editorSidebarContent')) return;
        container.innerHTML = `
          ${comments.map(c => {
            const authorUser = store.getUserByName(c.author) || store.users[0];
            return `<div class="comment-thread">
              <div class="comment ${c.resolved?'resolved':''}">
                <div class="comment-header">
                  <div class="comment-avatar" style="background:${authorUser.color}">${authorUser.initials}</div>
                  <span class="comment-author">${escapeHtml(c.author || authorUser.name)}</span>
                  <span class="comment-time">${formatDate(c.created_at)}</span>
                </div>
                <div class="comment-body">${escapeHtml(c.text)}</div>
                <div class="comment-actions">
                  <button class="comment-action" onclick="toggleResolveComment('${doc.id}','${c.id}')">${c.resolved?'Reopen':'Resolve'}</button>
                  <button class="comment-action" onclick="showReplyInput('${c.id}')">Reply</button>
                </div>
              </div>
              ${(c.replies||[]).map(r => {
                const rAuthor = store.getUserByName(r.author) || store.users[0];
                return `<div class="comment comment-reply">
                  <div class="comment-header">
                    <div class="comment-avatar" style="background:${rAuthor.color}">${rAuthor.initials}</div>
                    <span class="comment-author">${escapeHtml(r.author || rAuthor.name)}</span>
                    <span class="comment-time">${formatDate(r.created_at)}</span>
                  </div>
                  <div class="comment-body">${escapeHtml(r.text)}</div>
                </div>`;
              }).join('')}
              <div id="reply-${c.id}" style="display:none;margin-left:16px;margin-top:6px">
                <textarea id="reply-text-${c.id}" placeholder="Write a reply..." rows="2" style="width:100%;font-size:12px"></textarea>
                <button class="btn btn-primary btn-sm" onclick="addReply('${doc.id}','${c.id}')" style="margin-top:4px">Reply</button>
              </div>
            </div>`;
          }).join('')}
          <div class="comment-input-area" style="margin-top:12px">
            <textarea id="newCommentText" placeholder="Add a comment..." rows="3"></textarea>
            <button class="btn btn-primary btn-sm" onclick="addComment('${doc.id}')" style="margin-top:4px">Comment</button>
          </div>
        `;
      } catch (e) {
        container.innerHTML = `<div style="padding:12px;color:var(--danger);font-size:12px">Failed to load comments: ${escapeHtml(e.message)}</div>`;
      }
    })();
  } else if (editorSidebarTab === 'history') {
    (async () => {
      try {
        const versions = await loadVersions(doc.id);
        if (!document.getElementById('editorSidebarContent')) return;
        container.innerHTML = `
          <div class="version-list">
            ${versions.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">No version history yet. Save to create the first version.</div>' : ''}
            ${versions.slice().reverse().map(v => {
              return `<div class="version-item">
                <div class="version-label">v${v.version_number}: ${escapeHtml(v.change_summary || 'Updated')}</div>
                <div class="version-meta">${escapeHtml(v.author || 'Ryan Murphy')} &middot; ${formatDate(v.created_at)}</div>
              </div>`;
            }).join('')}
          </div>
        `;
      } catch (e) {
        container.innerHTML = `<div style="padding:12px;color:var(--danger);font-size:12px">Failed to load history: ${escapeHtml(e.message)}</div>`;
      }
    })();
  } else if (editorSidebarTab === 'review') {
    (async () => {
      try {
        const reviews = await loadReviews(doc.id);
        // Load related docs
        const relatedDocs = [];
        for (const rdId of (doc.relatedDocs || [])) {
          try {
            const rd = await loadDocument(rdId);
            if (rd) relatedDocs.push(rd);
          } catch(e) {}
        }
        if (!document.getElementById('editorSidebarContent')) return;
        const versions = await loadVersions(doc.id);
        container.innerHTML = `
          <div class="review-info-section">
            <h4>Status</h4>
            <span class="badge-status badge-${doc.status}" style="font-size:13px">${doc.status}</span>
          </div>
          <div class="review-info-section">
            <h4>Reviewers</h4>
            ${reviews.map(r => {
              const reviewer = store.getUserByName(r.reviewer) || store.users[0];
              return `<div class="reviewer-item">
                <div class="reviewer-avatar" style="background:${reviewer.color}">${reviewer.initials}</div>
                <span class="reviewer-name">${escapeHtml(r.reviewer)}</span>
                <span class="reviewer-status ${r.status}">${r.status === 'approved' ? 'Approved' : r.status === 'changes' ? 'Changes' : 'Pending'}</span>
              </div>
              ${r.comment ? `<div style="font-size:11px;color:var(--text-muted);margin-left:32px;margin-bottom:6px">${escapeHtml(r.comment)}</div>` : ''}`;
            }).join('')}
            ${reviews.length === 0 ? '<div style="font-size:12px;color:var(--text-muted)">No reviewers assigned yet.</div>' : ''}
          </div>
          ${relatedDocs.length > 0 ? `
          <div class="related-docs">
            <h4>Related Documents</h4>
            ${relatedDocs.map(rd => `
              <div class="related-doc-link" onclick="navigate('editor','${rd.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                ${escapeHtml(rd.title)}
              </div>
            `).join('')}
          </div>` : ''}
          <div class="review-info-section" style="margin-top:12px">
            <h4>Document Info</h4>
            <div style="font-size:12px;color:var(--text-secondary);line-height:2">
              <div><strong>Type:</strong> ${doc.type === 'db' ? 'Database Design' : doc.type.toUpperCase()}</div>
              <div><strong>Author:</strong> ${escapeHtml(doc.author)}</div>
              <div><strong>Created:</strong> ${formatDate(doc.createdAt)}</div>
              <div><strong>Updated:</strong> ${formatDate(doc.updatedAt)}</div>
              <div><strong>Versions:</strong> ${versions.length}</div>
              <div><strong>Tags:</strong> ${(doc.tags || []).map(t => typeof t === 'string' && t.startsWith('t') ? (store.getTag(t)||{}).name : t).filter(Boolean).join(', ') || 'None'}</div>
            </div>
          </div>
        `;
      } catch (e) {
        container.innerHTML = `<div style="padding:12px;color:var(--danger);font-size:12px">Failed to load reviews: ${escapeHtml(e.message)}</div>`;
      }
    })();
  }
}

function toggleEditorSidebar() {
  const sidebar = document.getElementById('editorSidebar');
  if (sidebar) sidebar.classList.toggle('mobile-open');
}

function execCmd(cmd, val) {
  document.execCommand(cmd, false, val || null);
  document.getElementById('editorArea').focus();
}

function updateDocTitle() {
  const titleInput = document.getElementById('editorTitle');
  if (titleInput && currentDocId) {
    DB.updateDocument(currentDocId, { title: titleInput.value }).catch(e => console.error('Title save error:', e));
    cache.invalidate('documents');
    if (currentEditorDoc) currentEditorDoc.title = titleInput.value;
  }
}

let autoSaveTimer = null;
function autoSaveDraft() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    saveDocument(true);
  }, 3000);
}

async function saveDocument(silent) {
  const area = document.getElementById('editorArea');
  const titleInput = document.getElementById('editorTitle');
  if (!area || !currentDocId) return;

  const newContent = area.innerHTML;
  const newTitle = titleInput ? titleInput.value : undefined;

  try {
    const fields = { content: newContent };
    if (newTitle) fields.title = newTitle;
    await DB.updateDocument(currentDocId, fields);

    // Create a new version (non-silent saves only)
    if (!silent) {
      await DB.createVersion(currentDocId, newContent, 'Manual save', 'Ryan Murphy');
      cache.invalidate('versions', currentDocId);
    }

    cache.invalidate('documents');
    if (currentEditorDoc) {
      currentEditorDoc.content = newContent;
      if (newTitle) currentEditorDoc.title = newTitle;
    }
    if (!silent) {
      showToast('Document saved', 'success');
      // Refresh history tab if visible
      if (editorSidebarTab === 'history') renderEditorSidebar();
    }
  } catch (e) {
    if (!silent) showToast('Save failed: ' + e.message, 'error');
    console.error('Save error:', e);
  }
}

async function submitForReview(docId) {
  try {
    await DB.updateDocument(docId, { status: 'review' });
    cache.invalidate('documents');
    showToast('Submitted for review', 'success');
    navigate('editor', docId);
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

async function approveDocument(docId) {
  try {
    const user = store.getCurrentUser();
    // Check if this reviewer already has a review
    const reviews = await loadReviews(docId, true);
    const existing = reviews.find(r => r.reviewer === user.name);
    if (existing) {
      await DB.updateReview(existing.id, 'approved', 'Approved.');
    } else {
      await DB.addReview(docId, user.name, 'approved', 'Approved.');
    }
    cache.invalidate('reviews', docId);

    // Check if all reviews are approved (need 2+)
    const updatedReviews = await loadReviews(docId, true);
    if (updatedReviews.length >= 2 && updatedReviews.every(r => r.status === 'approved')) {
      await DB.updateDocument(docId, { status: 'approved' });
      cache.invalidate('documents');
    }

    showToast('Review submitted', 'success');
    navigate('editor', docId);
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

async function addComment(docId) {
  const textarea = document.getElementById('newCommentText');
  if (!textarea || !textarea.value.trim()) return;
  const user = store.getCurrentUser();
  try {
    await DB.addComment(docId, null, null, user.name, textarea.value.trim());
    cache.invalidate('comments', docId);
    renderEditorSidebar();
  } catch (e) {
    showToast('Failed to add comment: ' + e.message, 'error');
  }
}

function showReplyInput(commentId) {
  const el = document.getElementById('reply-' + commentId);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function addReply(docId, commentId) {
  const textarea = document.getElementById('reply-text-' + commentId);
  if (!textarea || !textarea.value.trim()) return;
  const user = store.getCurrentUser();
  try {
    await DB.addComment(docId, null, commentId, user.name, textarea.value.trim());
    cache.invalidate('comments', docId);
    renderEditorSidebar();
  } catch (e) {
    showToast('Failed to add reply: ' + e.message, 'error');
  }
}

async function toggleResolveComment(docId, commentId) {
  try {
    // Find current state
    const comments = await loadComments(docId);
    const comment = comments.find(c => c.id === commentId);
    const newResolved = comment ? !comment.resolved : true;
    await DB.resolveComment(commentId, newResolved);
    cache.invalidate('comments', docId);
    renderEditorSidebar();
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

    await DB.createDocument({
      id: docId,
      title: template.name.replace('Template', '').trim() + ' - New',
      type: template.type,
      status: 'draft',
      content: template.content,
      author: user.name,
      tags: [],
      related_doc_ids: []

    showToast('Document created from template', 'success');

function renderReviews(content, title, actions) {
  title.textContent = 'Reviews';
  actions.innerHTML = '';

  showLoading(content, 'Loading reviews...');

  (async () => {
    try {
      const docs = await loadDocuments();
      const pending = docs.filter(d => d.status === 'review');
      const approved = docs.filter(d => d.status === 'approved');

      if (currentPage !== 'reviews') return;

      content.innerHTML = `
        <div class="tabs">
          <div class="tab active" onclick="switchReviewTab(this,'pending')">Pending (${pending.length})</div>
          <div class="tab" onclick="switchReviewTab(this,'approved')">Approved (${approved.length})</div>

async function switchReviewTab(el, tab) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  const reviewContent = document.getElementById('reviewContent');
  if (!reviewContent) return;
  reviewContent.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

  try {
    const docs = await loadDocuments();
    const list = tab === 'pending' ? docs.filter(d => d.status === 'review') : docs.filter(d => d.status === 'approved');

    reviewContent.innerHTML = `
      <div class="review-list">
        ${list.length === 0 ? `<div class="empty-state"><h3>No ${tab} reviews</h3></div>` :
          list.map(d => renderReviewCard(d)).join('')
        }

    `;
  } catch(e) {
    reviewContent.innerHTML = `<div class="error-banner"><span>Failed to load: ${escapeHtml(e.message)}</span></div>`;

            Render
          </button>

async function refreshTableCommentCounts() {
  try {
    const rows = await DB.query("SELECT table_name, COUNT(*) as cnt FROM hld_comments WHERE table_name IS NOT NULL AND parent_id IS NULL GROUP BY table_name");
    tableCommentCounts = {};
    for (const r of rows) {
      tableCommentCounts[r.table_name] = parseInt(r.cnt) || 0;
    }
    // Update badges in DOM if still on visualizer
    const area = document.getElementById('tableButtonsArea');
    if (area && currentPage === 'visualizer') {
      area.innerHTML = schemaTables.map(t => {
        const count = tableCommentCounts[t] || 0;
        return `<button class="btn btn-secondary btn-sm" onclick="openTableCommentPanel('${t}')" style="position:relative">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${t}
          ${count > 0 ? `<span style="background:var(--accent);color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;margin-left:4px">${count}</span>` : ''}
        </button>`;
      }).join('');
    }
  } catch(e) { console.error('Failed to load table comment counts:', e); }
}

function loadSchema(schemaId) {
  const schema = (store.schemas || []).find(s => s.id === schemaId);
  if (!schema) return;
  currentSchemaText = schema.schema;
  const input = document.getElementById('schemaInput');
  if (input) input.value = currentSchemaText;
  renderDiagram();
}

function renderDiagram() {
  const input = document.getElementById('schemaInput');
  const output = document.getElementById('diagramOutput');
  if (!input || !output) return;

  currentSchemaText = input.value;
  if (!currentSchemaText.trim()) {
    output.innerHTML = '<div style="color:var(--text-muted);font-size:13px">Enter a Mermaid ER diagram above and click Render</div>';
    return;
  }

  const uniqueId = 'mermaid-' + Date.now();
  output.innerHTML = '<div class="mermaid" id="' + uniqueId + '">' + currentSchemaText + '</div>';

  try {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#4c7bf5',
        primaryTextColor: '#e8ecf4',
        primaryBorderColor: '#2d3548',
        lineColor: '#5a6478',
        secondaryColor: '#242b3d',
        tertiaryColor: '#1e2538'
      }
    });
    mermaid.run({ querySelector: '#' + uniqueId });
  } catch(e) {
    output.innerHTML = `<div style="color:var(--danger);font-size:13px">Error rendering diagram: ${escapeHtml(e.message)}</div>`;
  }
}

// ---- TABLE COMMENT PANEL ----
function openTableCommentPanel(tableName) {
  tableCommentPanelTable = tableName;
  renderTableCommentPanel();
}

function closeTableCommentPanel() {
  tableCommentPanelTable = null;
  const overlay = document.getElementById('tableCommentOverlay');
  const panel = document.getElementById('tableCommentPanel');
  if (overlay) overlay.remove();
  if (panel) panel.remove();
}

async function renderTableCommentPanel() {
  // Remove existing
  const existingOverlay = document.getElementById('tableCommentOverlay');
  const existingPanel = document.getElementById('tableCommentPanel');
  if (existingOverlay) existingOverlay.remove();
  if (existingPanel) existingPanel.remove();
  if (!tableCommentPanelTable) return;

  const tableName = tableCommentPanelTable;

  const overlay = document.createElement('div');
  overlay.className = 'table-comment-panel-overlay';
  overlay.id = 'tableCommentOverlay';
  overlay.onclick = closeTableCommentPanel;
  document.body.appendChild(overlay);

  const panel = document.createElement('div');
  panel.className = 'table-comment-panel';
  panel.id = 'tableCommentPanel';
  panel.innerHTML = `
    <div class="table-comment-panel-header">
      <h3>Comments on <code>${tableName}</code></h3>
      <button class="btn-icon" onclick="closeTableCommentPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="table-comment-panel-body" id="tableCommentBody">
      <div class="loading-spinner"><div class="spinner"></div>Loading comments...</div>
    </div>
    <div class="table-comment-panel-footer">
      <textarea id="tableCommentText" placeholder="Add a comment about the ${tableName} table..." rows="3"></textarea>
      <div class="footer-row">
        <input type="text" id="tableCommentAuthor" placeholder="Your name" value="Ryan Murphy">
        <button class="btn btn-primary btn-sm" onclick="addTableCommentFromPanel('${tableName}')">Comment</button>
      </div>
    </div>
  `;
  document.body.appendChild(panel);

  // Load comments async
  try {
    const comments = await loadTableComments(tableName, true);
    const body = document.getElementById('tableCommentBody');
    if (!body) return;

    body.innerHTML = comments.length === 0 ?
      '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">No comments yet on this table.</div>' :
      comments.map(c => `
        <div class="comment-thread" style="margin-bottom:12px">
          <div class="comment">
            <div class="comment-header">
              <div class="comment-avatar" style="background:var(--accent);">${(c.author || 'R')[0].toUpperCase()}</div>
              <span class="comment-author">${escapeHtml(c.author || 'Ryan')}</span>
              <span class="comment-time">${formatDate(c.created_at)}</span>
            </div>
            <div class="comment-body">${escapeHtml(c.text)}</div>
            <div class="comment-actions">
              <button class="comment-action" onclick="showTableReplyInput('${c.id}')">Reply</button>
            </div>
          </div>
          ${(c.replies||[]).map(r => `
            <div class="comment comment-reply">
              <div class="comment-header">
                <div class="comment-avatar" style="background:var(--purple);">${(r.author || 'R')[0].toUpperCase()}</div>
                <span class="comment-author">${escapeHtml(r.author || 'Ryan')}</span>
                <span class="comment-time">${formatDate(r.created_at)}</span>
              </div>
              <div class="comment-body">${escapeHtml(r.text)}</div>
            </div>
          `).join('')}
          <div id="table-reply-${c.id}" style="display:none;margin-left:16px;margin-top:6px">
            <textarea id="table-reply-text-${c.id}" placeholder="Write a reply..." rows="2" style="width:100%;font-size:12px"></textarea>
            <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
              <input type="text" id="table-reply-author-${c.id}" placeholder="Your name" value="Ryan Murphy" style="flex:1;font-size:12px;padding:4px 8px">
              <button class="btn btn-primary btn-sm" onclick="addTableCommentReply('${tableName}','${c.id}')">Reply</button>
            </div>
          </div>
        </div>
      `).join('');
  } catch(e) {
    const body = document.getElementById('tableCommentBody');
    if (body) body.innerHTML = `<div style="padding:20px;color:var(--danger);font-size:13px">Failed to load comments: ${escapeHtml(e.message)}</div>`;
  }
}

function showTableReplyInput(commentId) {
  const el = document.getElementById('table-reply-' + commentId);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function addTableCommentFromPanel(tableName) {
  const textarea = document.getElementById('tableCommentText');
  const authorInput = document.getElementById('tableCommentAuthor');
  if (!textarea || !textarea.value.trim()) return;

  try {
    await DB.addComment(null, tableName, null, (authorInput && authorInput.value.trim()) || 'Ryan Murphy', textarea.value.trim());
    cache.invalidate('tableComments', tableName);
    await renderTableCommentPanel();
    refreshTableCommentCounts();
  } catch(e) {
    showToast('Failed to add comment: ' + e.message, 'error');
  }
}

async function addTableCommentReply(tableName, commentId) {
  const textarea = document.getElementById('table-reply-text-' + commentId);
  const authorInput = document.getElementById('table-reply-author-' + commentId);
  if (!textarea || !textarea.value.trim()) return;

  try {
    await DB.addComment(null, tableName, commentId, (authorInput && authorInput.value.trim()) || 'Ryan Murphy', textarea.value.trim());
    cache.invalidate('tableComments', tableName);
    await renderTableCommentPanel();
  } catch(e) {
    showToast('Failed to add reply: ' + e.message, 'error');
  }
}

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="newDocTitle" placeholder="Enter document title...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select id="newDocType">
              <option value="hld">HLD - High-Level Design</option>
              <option value="tsc">TSC - Steering Committee</option>
              <option value="db">Database Design</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="newDocDesc" rows="3" placeholder="Brief description of the document..."></textarea>
        </div>
        <div class="form-group">
          <label>Or start from a template</label>
          <select id="newDocTemplate">
            <option value="">Blank document</option>
            ${store.getTemplates().map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('newDocModal').remove()">Cancel</button>
        <button class="btn btn-primary" onclick="createNewDoc()">Create</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);
  document.getElementById('newDocTitle').focus();
}

async function createNewDoc() {
  const title = document.getElementById('newDocTitle').value.trim();
  const type = document.getElementById('newDocType').value;
  const desc = document.getElementById('newDocDesc').value.trim();
  const templateId = document.getElementById('newDocTemplate').value;

  if (!title) { showToast('Please enter a title', 'error'); return; }

  const user = store.getCurrentUser();
  let content = '<h1>' + escapeHtml(title) + '</h1><p>Start writing here...</p>';

  if (templateId) {
    const tpl = store.getTemplate(templateId);
    if (tpl) content = tpl.content;
  }

  const docId = crypto.randomUUID();

  try {
    await DB.createDocument({
      id: docId,
      title,
      type,
      status: 'draft',
      content,
      author: user.name,
      tags: [],
      related_doc_ids: []
    });

    // Create initial version
    await DB.createVersion(docId, content, 'Initial draft', user.name);

    cache.invalidate('documents');
    document.getElementById('newDocModal').remove();
    showToast('Document created', 'success');
    navigate('editor', docId);
  } catch (e) {
    showToast('Failed to create document: ' + e.message, 'error');
  }
}

// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const now = new Date();
    const diffMs = now - d;
    const diffDays = Math.floor(diffMs / (1000*60*60*24));
    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    if (diffDays < 7) return diffDays + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch(e) { return dateStr; }
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function showToast(message, type) {
  const container = document.getElementById('toasts');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ============================================================
// SEED DATA ON FIRST LOAD
// ============================================================
async function seedIfEmpty() {
  try {
    const rows = await DB.query("SELECT COUNT(*) as cnt FROM hld_documents");
    const count = parseInt(rows[0]?.cnt) || 0;
    if (count > 0) return; // already seeded

    console.log('Seeding initial documents...');

    // Seed API2 Proposal document
    const doc1Id = crypto.randomUUID();
    await DB.createDocument({
      id: doc1Id,
      title: 'api2 -- Workflow Registry API',
      type: 'hld',
      status: 'review',
      content: api2ProposalContent,
      author: 'Ryan Murphy',
      tags: ['Architecture', 'API Design', 'Database'],
      related_doc_ids: []
    });

    // Seed DB Schema document
    const doc2Id = crypto.randomUUID();
    await DB.createDocument({
      id: doc2Id,
      title: 'NESIFY Database Schema Design',
      type: 'db',
      status: 'review',
      content: dbSchemaContent,
      author: 'Ryan Murphy',
      tags: ['Database', 'Architecture', 'Migration'],
      related_doc_ids: []
    });

    // Link them as related
    await DB.updateDocument(doc1Id, { related_doc_ids: [doc2Id] });
    await DB.updateDocument(doc2Id, { related_doc_ids: [doc1Id] });

    // Create initial versions
    await DB.createVersion(doc1Id, api2ProposalContent, 'Initial proposal', 'Ryan Murphy');
    await DB.createVersion(doc2Id, dbSchemaContent, 'Initial schema design', 'Ryan Murphy');

    console.log('Seed complete. doc1=' + doc1Id + ', doc2=' + doc2Id);
    cache.invalidateAll();
  } catch (e) {
    console.error('Seed failed:', e);
    // Non-fatal -- app will work, just empty
  }
}
